<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Metrics — TA Metrics</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-header">TA Metrics</div>
    <ul class="nav-list">
      <li><a href="pr-metrics.html" class="nav-item">PR Metrics</a></li>
      <li><a href="#" class="nav-item nav-item--disabled" title="Coming soon">Summary</a></li>
    </ul>
  </nav>
  <main class="content">
    <div class="page-header">
      <h1>PR Metrics</h1>
      <span class="period">Mar 14 – Jun 14, 2026</span>
    </div>

    <div class="cards-grid" id="cards-grid" data-testid="cards-grid">

      <!-- Pickup Time -->
      <div class="metric-card" data-testid="card-pickup-time">
        <div class="card-header">
          <h2 class="card-title">Pickup Time</h2>
          <p class="card-subtitle">PR ready → first review (SLA metric)</p>
        </div>
        <table class="metric-table">
          <thead>
            <tr>
              <th>Percentile</th>
              <th>Value</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody id="pickup-time-rows"></tbody>
        </table>
        <div class="ladder-legend" data-testid="pickup-ladder"></div>
      </div>

      <!-- Acceptance Rate -->
      <div class="metric-card" data-testid="card-acceptance-rate">
        <div class="card-header">
          <h2 class="card-title">Acceptance Rate</h2>
          <p class="card-subtitle">PRs merged within 30 days (LinearB 2026)</p>
        </div>
        <div class="single-metric-display" id="acceptance-rate-value"></div>
        <div class="ladder-legend" data-testid="acceptance-ladder"></div>
      </div>

      <!-- Iteration Time -->
      <div class="metric-card" data-testid="card-iteration-time">
        <div class="card-header">
          <h2 class="card-title">Iteration Time</h2>
          <p class="card-subtitle">First review → last approval</p>
        </div>
        <table class="metric-table">
          <thead>
            <tr>
              <th>Percentile</th>
              <th>Value</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody id="iteration-time-rows"></tbody>
        </table>
        <div class="ladder-legend" data-testid="iteration-ladder"></div>
      </div>

    </div>

  </main>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/pr-metrics.js"></script>
</body>
</html>
